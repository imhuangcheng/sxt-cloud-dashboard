name: SXT cloud monitor

on:
  workflow_dispatch:
    inputs:
      force_scan:
        description: "Run the scan even outside configured trading sessions"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "*/5 * * * 1-5"
  push:
    paths:
      - "config/watchlist.json"
      - "config/refresh.json"

permissions:
  contents: write

concurrency:
  group: sxt-cloud-monitor-${{ github.ref }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          SERVERCHAN_SEND_KEY: ${{ secrets.SERVERCHAN_SEND_KEY }}
          SXT_FORCE_SCAN: ${{ github.event_name == 'push' && 'true' || github.event.inputs.force_scan || 'false' }}
        run: python scripts/run.py

      - name: Write failed status
        if: failure()
        env:
          SXT_STATUS_ERROR: "GitHub Actions monitor step failed."
        run: python scripts/write_status.py

      - name: Commit data changes
        if: always()
        run: |
          if git diff --quiet -- data/latest_signals.json data/alert_history.json data/status.json; then
            echo "No data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          target_branch="${GITHUB_REF_NAME:-main}"
          tmpdir="$(mktemp -d)"
          cp data/latest_signals.json "$tmpdir/latest_signals.json"
          cp data/alert_history.json "$tmpdir/alert_history.json"
          cp data/status.json "$tmpdir/status.json"
          git fetch origin "$target_branch"
          git reset --hard "origin/$target_branch"
          mkdir -p data
          cp "$tmpdir/latest_signals.json" data/latest_signals.json
          cp "$tmpdir/alert_history.json" data/alert_history.json
          cp "$tmpdir/status.json" data/status.json
          if git diff --quiet -- data/latest_signals.json data/alert_history.json data/status.json; then
            echo "No data changes after syncing latest branch."
            exit 0
          fi
          git add data/latest_signals.json data/alert_history.json data/status.json
          git commit -m "Update SXT monitor data"
          git push origin "HEAD:$target_branch"
