<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SXT 云端双周期监控</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #65758b;
      --line: #d9e0e8;
      --green: #16794c;
      --green-bg: #e7f5ee;
      --red: #b42318;
      --red-bg: #fdecec;
      --blue: #1d4ed8;
      --blue-bg: #eaf1ff;
      --gray-bg: #eef2f6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    .app {
      width: min(1160px, calc(100% - 32px));
      margin: 26px auto;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 5px;
      font-size: 25px;
      letter-spacing: 0;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    input, select, button {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
      font: inherit;
    }

    button {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
      cursor: pointer;
    }

    button.secondary {
      border-color: var(--line);
      background: #fff;
      color: var(--text);
    }

    button.danger {
      border-color: var(--red);
      background: var(--red);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 16px;
      margin-bottom: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 22px rgba(31, 41, 51, 0.06);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: 16px;
    }

    .panel-body {
      padding: 16px;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 18px;
    }

    .status-item {
      min-width: 0;
    }

    .status-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 3px;
    }

    .status-value {
      overflow-wrap: anywhere;
      font-weight: 700;
    }

    .status-message,
    .watchlist-message {
      color: var(--muted);
      font-size: 13px;
      margin-top: 12px;
    }

    .status-message.error,
    .watchlist-message.error {
      color: var(--red);
    }

    .watchlist-form {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .group-board { display: flex; gap: 16px; overflow-x: auto; align-items: flex-start; padding-bottom: 8px; }
    .group-card { flex: 0 0 280px; max-width: 320px; border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: #fbfcfe; }
    .group-card.summary { background: #f5f8ff; }
    .group-card-head { display: flex; justify-content: space-between; gap: 8px; align-items: center; margin-bottom: 10px; }
    .group-card-head strong { overflow-wrap: anywhere; }
    .group-actions { display: flex; gap: 6px; margin-top: 10px; }
    .group-actions button { height: 30px; font-size: 12px; }
    .group-symbols { display: flex; flex-direction: column; gap: 6px; min-height: 34px; }
    .group-symbol { display: flex; justify-content: space-between; gap: 6px; align-items: center; padding: 5px 7px; border: 1px solid var(--line); border-radius: 5px; background: #fff; }
    .group-symbol button { border: 0; background: transparent; color: var(--red); padding: 0 4px; height: 24px; }
    .group-add { display: flex; gap: 6px; }
    .group-add input { min-width: 0; width: 100%; }
    .group-add button { flex: 0 0 auto; }
    .group-tabs-wrap { margin: 16px 0 0; border: 1px solid var(--line); border-bottom: 0; border-radius: 8px 8px 0 0; background: var(--panel); overflow-x: auto; }
    .group-tabs { display: flex; align-items: stretch; gap: 4px; min-width: max-content; padding: 6px 10px 0; }
    .group-tab { height: 42px; border: 0; border-bottom: 3px solid transparent; border-radius: 6px 6px 0 0; background: transparent; color: var(--muted); padding: 0 18px; font-weight: 700; white-space: nowrap; }
    .group-tab:hover { background: var(--gray-bg); color: var(--text); }
    .group-tab.active { border-bottom-color: var(--blue); background: var(--blue-bg); color: var(--blue); }
    .group-tab.custom { cursor: grab; }
    .group-tab.custom:active { cursor: grabbing; }
    .group-tab.dragging { opacity: .45; }
    .group-tab-hint { color: var(--muted); font-size: 12px; padding: 0 10px 8px; }

    .watchlist-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 34px;
      margin-bottom: 12px;
    }

    .watchlist-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #f9fafb;
      padding: 4px 6px 4px 10px;
      font-weight: 700;
    }

    .watchlist-chip button {
      width: 24px;
      height: 24px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--red);
      padding: 0;
      line-height: 1;
    }

    .clickable-row {
      cursor: pointer;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 8px 22px rgba(31, 41, 51, 0.06);
    }

    table {
      width: 100%;
      min-width: 880px;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: #f9fafb;
      color: #394554;
      font-size: 13px;
      z-index: 1;
    }

    tbody tr.alert {
      background: #fff9e8;
    }

    tbody tr:hover {
      background: #f8fbff;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 58px;
      border-radius: 999px;
      padding: 3px 9px;
      font-weight: 700;
      font-size: 13px;
    }

    .buy {
      color: var(--green);
      background: var(--green-bg);
    }

    .bad {
      color: var(--red);
      background: var(--red-bg);
    }

    .watch {
      color: var(--blue);
      background: var(--blue-bg);
    }

    .neutral {
      color: var(--muted);
      background: var(--gray-bg);
    }

    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 760px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .controls {
        align-items: stretch;
        flex-direction: column;
      }

      .dashboard-grid {
        grid-template-columns: 1fr;
      }

      .status-grid {
        grid-template-columns: 1fr;
      }

      .watchlist-form {
        flex-direction: column;
      }

      input, select, button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>SXT 云端双周期监控</h1>
        <div class="meta">最后扫描：<span id="updatedAt">-</span>　<span id="message"></span></div>
      </div>
      <div class="controls">
        <input id="searchInput" type="search" placeholder="输入代码或名称筛选">
        <select id="statusFilter" aria-label="状态筛选">
          <option value="">全部状态</option>
          <option value="ALERT">双周期信号</option>
          <option value="WATCH">观察</option>
          <option value="ERROR">异常</option>
          <option value="UNSUPPORTED">暂不支持</option>
        </select>
        <button id="refreshButton" type="button">刷新</button>
      </div>
    </header>

    <section class="dashboard-grid" aria-label="云端监控概览">
      <div class="panel">
        <div class="panel-head">
          <h2 class="panel-title">云端运行状态</h2>
          <span class="badge neutral" id="workflowBadge">-</span>
        </div>
        <div class="panel-body">
          <div class="status-grid">
            <div class="status-item">
              <div class="status-label">运行状态</div>
              <div class="status-value" id="cloudStatus">-</div>
            </div>
            <div class="status-item">
              <div class="status-label">状态更新时间</div>
              <div class="status-value" id="lastScan">-</div>
            </div>
            <div class="status-item">
              <div class="status-label">行情数据更新时间</div>
              <div class="status-value" id="dataUpdatedAt">-</div>
            </div>
            <div class="status-item">
              <div class="status-label">下次扫描时间</div>
              <div class="status-value" id="nextScan">-</div>
            </div>
            <div class="status-item">
              <div class="status-label">扫描股票数</div>
              <div class="status-value" id="stockCount">-</div>
            </div>
            <div class="status-item">
              <div class="status-label">本次信号数量</div>
              <div class="status-value" id="signalCount">-</div>
            </div>
            <div class="status-item">
              <div class="status-label">运行耗时</div>
              <div class="status-value" id="durationSeconds">-</div>
            </div>
          </div>
          <div class="status-message" id="statusMessage"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2 class="panel-title">股票池管理</h2>
          <span class="meta" id="watchlistCount">0 个分组 / 0 只</span>
        </div>
        <div class="panel-body">
          <div class="controls" style="margin-bottom:12px"><button id="newGroupButton" type="button">+ 新建分组</button><button class="secondary" id="saveWatchlistButton" type="button">保存变更</button></div>
          <div class="group-board" id="groupBoard"></div>
          <div class="watchlist-message" id="watchlistMessage"></div>
        </div>
      </div>
    </section>

    <section class="table-wrap">
      <div class="group-tabs-wrap">
        <div class="group-tabs" id="groupTabs" role="tablist" aria-label="股票分组标签"></div>
        <div class="group-tab-hint">点击标签切换股票分组；拖动自定义标签可以调整顺序。</div>
      </div>
      <table>
        <thead>
          <tr>
            <th>股票代码</th>
            <th>股票名称</th>
            <th>所属分组</th>
            <th>日K SXT</th>
            <th>15分钟 SXT</th>
            <th>状态</th>
            <th>日K时间</th>
            <th>15分钟时间</th>
            <th>说明</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="emptyState" class="empty" hidden>暂无数据</div>
    </section>
  </main>

  <script>
    const DATA_URL = "../data/latest_signals.json";
    const STATUS_URL = "../data/status.json";
    const WATCHLIST_API = "/.netlify/functions/watchlist";
    const WATCHLIST_FALLBACK_URL = "../config/watchlist_groups.json";
    const REFRESH_API = "/.netlify/functions/refresh";
    const PROD_ORIGIN = "https://sxt-cloud.netlify.app";
    const MONITOR_DETAIL_URL = "https://hc-dual-period-monitor.netlify.app/";
    const REFRESH_MS = 60000;
    const STATUS_REFRESH_MS = 30000;
    const STOCK_NAME_FALLBACKS = {
      "002709": "天赐材料",
      "002876": "三利谱",
      "300151": "昌红科技",
      "300219": "鸿利智汇",
      "300607": "拓斯达",
      "600392": "盛和资源",
      "600458": "时代新材",
      "600519": "贵州茅台",
      "600601": "方正科技",
    };
    let rows = [];
    let watchlist = [];
    let groupsPayload = { version: 1, groups: [] };
    let selectedTabId = "summary";
    let draggedGroupId = "";

    const updatedAt = document.getElementById("updatedAt");
    const message = document.getElementById("message");
    const tableBody = document.getElementById("tableBody");
    const emptyState = document.getElementById("emptyState");
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const refreshButton = document.getElementById("refreshButton");
    const workflowBadge = document.getElementById("workflowBadge");
    const cloudStatus = document.getElementById("cloudStatus");
    const lastScan = document.getElementById("lastScan");
    const dataUpdatedAt = document.getElementById("dataUpdatedAt");
    const nextScan = document.getElementById("nextScan");
    const stockCount = document.getElementById("stockCount");
    const signalCount = document.getElementById("signalCount");
    const durationSeconds = document.getElementById("durationSeconds");
    const statusMessage = document.getElementById("statusMessage");
    const newGroupButton = document.getElementById("newGroupButton");
    const saveWatchlistButton = document.getElementById("saveWatchlistButton");
    const groupBoard = document.getElementById("groupBoard");
    const groupTabs = document.getElementById("groupTabs");
    const watchlistCount = document.getElementById("watchlistCount");
    const watchlistMessage = document.getElementById("watchlistMessage");

    function badgeClass(value, status) {
      if (status === "ALERT" || value === 2) return "buy";
      if (status === "ERROR") return "bad";
      if (status === "WATCH") return "watch";
      return "neutral";
    }

    function formatValue(value) {
      return value === null || value === undefined ? "-" : value;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;",
      }[char]));
    }

    function stockCode(row) {
      return String(row.code || row.symbol || row.stock_code || "").trim();
    }

    function stockName(row) {
      const name = String(row.name || "").trim();
      if (name) return name;
      return STOCK_NAME_FALLBACKS[stockCode(row)] || "";
    }

    function normalizeCodes(codes) {
      return [...new Set(codes.map((code) => String(code).trim()).filter(Boolean))].sort();
    }

    function syncWatchlistFromGroups() {
      watchlist = normalizeCodes(groupsPayload.groups.flatMap((group) => group.symbols || []));
    }

    function candidateUrls(path) {
      const values = [];
      const add = (value) => {
        if (!values.includes(value)) values.push(value);
      };
      add(path);
      if (path.startsWith("/")) {
        add(`${PROD_ORIGIN}${path}`);
      } else if (path.startsWith("../")) {
        add(`${PROD_ORIGIN}/${path.replace(/^\.\.\//, "")}`);
      }
      return values;
    }

    function cacheBust(url) {
      const separator = url.includes("?") ? "&" : "?";
      return `${url}${separator}t=${Date.now()}`;
    }

    async function fetchWithFallback(path, options = {}) {
      let lastError = null;
      let lastResponse = null;
      const method = String(options.method || "GET").toUpperCase();
      for (const url of candidateUrls(path)) {
        try {
          const requestUrl = method === "GET" ? cacheBust(url) : url;
          const response = await fetch(requestUrl, {
            cache: "no-store",
            ...options,
          });
          if (!response.ok && candidateUrls(path).length > 1) {
            lastResponse = response;
            continue;
          }
          return response;
        } catch (error) {
          lastError = error;
        }
      }
      if (lastResponse) return lastResponse;
      throw lastError || new Error("Failed to fetch");
    }

    function mergeWatchlistRows() {
      const existing = new Map(rows.map((row) => [stockCode(row), row]));
      const merged = [];
      for (const code of watchlist) {
        merged.push(existing.get(code) || {
          code,
          name: "",
          daily_sxt: null,
          minute15_sxt: null,
          status: "NO_DATA",
          last_daily_time: "",
          last_15m_time: "",
          error: "等待云端扫描",
        });
        existing.delete(code);
      }
      rows = [...merged, ...existing.values()];
    }

    function groupsFor(code) {
      return groupsPayload.groups.filter((group) => group.symbols.includes(code)).map((group) => group.name);
    }

    function selectedSymbols() {
      if (selectedTabId === "summary") return new Set(watchlist);
      const group = groupsPayload.groups.find((item) => item.id === selectedTabId);
      return new Set(group ? group.symbols : watchlist);
    }

    function render() {
      const keyword = searchInput.value.trim().toLowerCase();
      const status = statusFilter.value;
      const symbolsInTab = selectedSymbols();
      const filtered = rows.filter((row) => {
        const hitKeyword = !keyword
          || String(row.code || "").toLowerCase().includes(keyword)
          || stockName(row).toLowerCase().includes(keyword);
        const hitStatus = !status || row.status === status;
        const hitGroup = symbolsInTab.has(stockCode(row));
        return hitKeyword && hitStatus && hitGroup;
      });

      tableBody.innerHTML = "";
      emptyState.hidden = filtered.length > 0;

      for (const row of filtered) {
        const code = stockCode(row);
        const tr = document.createElement("tr");
        if (row.status === "ALERT") tr.classList.add("alert");
        if (/^\d{6}$/.test(code)) {
          tr.classList.add("clickable-row");
          tr.title = "打开 HC Monitor 项目";
          tr.addEventListener("click", () => {
            const url = new URL(MONITOR_DETAIL_URL);
            url.searchParams.set("code", code);
            window.open(url.toString(), "_blank", "noopener");
          });
        }
        tr.innerHTML = `
          <td>${escapeHtml(code || "-")}</td>
          <td>${escapeHtml(stockName(row) || "-")}</td>
          <td>${escapeHtml(groupsFor(code).join("、") || "-")}</td>
          <td><span class="badge ${badgeClass(row.daily_sxt, row.status)}">${formatValue(row.daily_sxt)}</span></td>
          <td><span class="badge ${badgeClass(row.minute15_sxt, row.status)}">${formatValue(row.minute15_sxt)}</span></td>
          <td><span class="badge ${badgeClass(null, row.status)}">${escapeHtml(row.status || "-")}</span></td>
          <td>${escapeHtml(row.last_daily_time || "-")}</td>
          <td>${escapeHtml(row.last_15m_time || "-")}</td>
          <td>${escapeHtml(row.error || "")}</td>
        `;
        tableBody.appendChild(tr);
      }
    }

    function renderStatus(payload) {
      workflowBadge.textContent = payload.workflow || "-";
      workflowBadge.className = `badge ${payload.workflow === "failed" ? "bad" : "buy"}`;
      cloudStatus.textContent = payload.status || "-";
      lastScan.textContent = payload.last_scan_time || payload.last_scan || "-";
      dataUpdatedAt.textContent = payload.data_updated_at || payload.last_daily_time || payload.last_15m_time || "-";
      nextScan.textContent = payload.next_scan_time || payload.next_scan || "-";
      stockCount.textContent = formatValue(payload.stocks);
      signalCount.textContent = formatValue(payload.signals);
      durationSeconds.textContent = payload.duration_seconds === undefined ? "-" : `${payload.duration_seconds}s`;
      statusMessage.className = `status-message ${payload.last_error ? "error" : ""}`;
      const skipped = payload.message && payload.message.includes("scan skipped");
      statusMessage.textContent = payload.last_error || (skipped
        ? `${payload.message}　行情时间以表格中的日K/15分钟K时间为准。`
        : `数据源：${payload.data_source || "-"}　版本：${payload.version || "-"}`);
    }

    async function loadStatus() {
      try {
        const response = await fetchWithFallback(STATUS_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        renderStatus(await response.json());
      } catch (error) {
        workflowBadge.textContent = "-";
        workflowBadge.className = "badge neutral";
        cloudStatus.textContent = "-";
        lastScan.textContent = "-";
        dataUpdatedAt.textContent = "-";
        nextScan.textContent = "-";
        stockCount.textContent = "-";
        signalCount.textContent = "-";
        durationSeconds.textContent = "-";
        statusMessage.className = "status-message error";
        statusMessage.textContent = "暂无云端状态数据，请检查 GitHub Actions 是否已运行。";
      }
    }

    function setWatchlistMessage(text, isError = false) {
      watchlistMessage.textContent = text;
      watchlistMessage.className = `watchlist-message ${isError ? "error" : ""}`;
    }

    function renderGroupTabs() {
      if (selectedTabId !== "summary" && !groupsPayload.groups.some((group) => group.id === selectedTabId)) selectedTabId = "summary";
      groupTabs.innerHTML = "";
      const summary = document.createElement("button");
      summary.type = "button";
      summary.className = `group-tab ${selectedTabId === "summary" ? "active" : ""}`;
      summary.setAttribute("role", "tab");
      summary.setAttribute("aria-selected", selectedTabId === "summary" ? "true" : "false");
      summary.textContent = `汇总（${watchlist.length}）`;
      summary.onclick = () => { selectedTabId = "summary"; renderGroupTabs(); render(); };
      groupTabs.appendChild(summary);
      for (const group of groupsPayload.groups) {
        const tab = document.createElement("button");
        tab.type = "button";
        tab.draggable = true;
        tab.dataset.groupId = group.id;
        tab.className = `group-tab custom ${selectedTabId === group.id ? "active" : ""}`;
        tab.setAttribute("role", "tab");
        tab.setAttribute("aria-selected", selectedTabId === group.id ? "true" : "false");
        tab.textContent = `${group.name}（${group.symbols.length}）`;
        tab.onclick = () => { selectedTabId = group.id; renderGroupTabs(); render(); };
        tab.ondragstart = (event) => { draggedGroupId = group.id; tab.classList.add("dragging"); event.dataTransfer.effectAllowed = "move"; };
        tab.ondragend = () => { draggedGroupId = ""; tab.classList.remove("dragging"); };
        tab.ondragover = (event) => { event.preventDefault(); event.dataTransfer.dropEffect = "move"; };
        tab.ondrop = (event) => {
          event.preventDefault();
          if (!draggedGroupId || draggedGroupId === group.id) return;
          const from = groupsPayload.groups.findIndex((item) => item.id === draggedGroupId);
          const to = groupsPayload.groups.findIndex((item) => item.id === group.id);
          if (from < 0 || to < 0) return;
          const [moved] = groupsPayload.groups.splice(from, 1);
          groupsPayload.groups.splice(to, 0, moved);
          renderGroupTabs(); renderWatchlist();
          setWatchlistMessage("标签顺序已修改，请保存。");
        };
        groupTabs.appendChild(tab);
      }
    }

    function renderWatchlist() {
      groupBoard.innerHTML = "";
      watchlistCount.textContent = `${groupsPayload.groups.length} 个分组 / ${watchlist.length} 只`;
      renderGroupTabs();
      const all = { id: "summary", name: "汇总", symbols: watchlist };
      for (const group of [all, ...groupsPayload.groups]) {
        const card = document.createElement("div"); card.className = `group-card ${group.id === "summary" ? "summary" : ""}`;
        card.innerHTML = `<div class="group-card-head"><strong>${escapeHtml(group.name)}</strong><span class="meta">${group.symbols.length} 只</span></div>`;
        const list = document.createElement("div"); list.className = "group-symbols";
        for (const code of group.symbols) {
          const row = document.createElement("div"); row.className = "group-symbol";
          row.innerHTML = `<span>${escapeHtml(code)} ${escapeHtml(STOCK_NAME_FALLBACKS[code] || "")}</span>`;
          if (group.id !== "summary") {
            const remove = document.createElement("button"); remove.textContent = "×"; remove.title = `从${group.name}删除`;
            remove.onclick = () => {
              group.symbols = group.symbols.filter((item) => item !== code);
              syncWatchlistFromGroups(); mergeWatchlistRows(); renderWatchlist(); render();
              setWatchlistMessage("股票池已修改，请保存。");
            };
            row.appendChild(remove);
          }
          list.appendChild(row);
        }
        card.appendChild(list);
        if (group.id !== "summary") {
          const add = document.createElement("div"); add.className = "group-add"; add.innerHTML = '<input maxlength="6" inputmode="numeric" placeholder="输入6位股票代码"><button type="button">新增</button>';
          const input = add.querySelector("input"); const addButton = add.querySelector("button");
          const addSymbol = () => { const code = input.value.trim(); if (!/^\d{6}$/.test(code)) return setWatchlistMessage("股票代码必须为6位数字。", true); if (group.symbols.includes(code)) return setWatchlistMessage("该股票已存在于当前分组。", true); group.symbols.push(code); group.symbols.sort(); input.value = ""; syncWatchlistFromGroups(); mergeWatchlistRows(); renderWatchlist(); render(); setWatchlistMessage("股票池已修改，请保存。"); };
          addButton.onclick = addSymbol; input.onkeydown = (event) => { if (event.key === "Enter") addSymbol(); };
          card.appendChild(add); const actions = document.createElement("div"); actions.className = "group-actions";
          const rename = document.createElement("button"); rename.className = "secondary"; rename.textContent = "重命名"; rename.onclick = () => { const name = prompt("新的分组名称", group.name)?.trim(); if (!name || groupsPayload.groups.some((item) => item !== group && item.name === name)) return setWatchlistMessage("分组名称不能为空且不得重复。", true); group.name = name; renderWatchlist(); setWatchlistMessage("股票池已修改，请保存。"); };
          const removeGroup = document.createElement("button"); removeGroup.className = "danger"; removeGroup.textContent = "删除分组"; removeGroup.onclick = () => { if (confirm(`确定删除分组“${group.name}”吗？该分组中的股票不会从其他分组中删除。`)) { groupsPayload.groups = groupsPayload.groups.filter((item) => item !== group); syncWatchlistFromGroups(); mergeWatchlistRows(); renderWatchlist(); render(); setWatchlistMessage("股票池已修改，请保存。"); } };
          actions.append(rename, removeGroup); card.appendChild(actions);
        }
        groupBoard.appendChild(card);
      }
    }

    function readWatchlistPayload(payload) {
      if (Array.isArray(payload.groups)) { groupsPayload = payload; return normalizeCodes(payload.groups.flatMap((group) => group.symbols || [])); }
      const values = Array.isArray(payload.watchlist) ? payload.watchlist : payload;
      return normalizeCodes(Array.isArray(values) ? values.map((item) => {
        if (typeof item === "string") return item;
        return item && (item.code || item.symbol || item.stock_code);
      }) : []);
    }

    async function loadWatchlist() {
      try {
        let response = await fetchWithFallback(WATCHLIST_API);
        if (!response.ok) {
          response = await fetchWithFallback(WATCHLIST_FALLBACK_URL);
        }
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        watchlist = readWatchlistPayload(await response.json());
        if (!groupsPayload.groups.length) groupsPayload = { version: 1, groups: [{ id: "default", name: "默认分组", symbols: watchlist }] };
        mergeWatchlistRows();
        renderWatchlist();
        render();
        setWatchlistMessage("股票池已读取。");
      } catch (error) {
        watchlist = [];
        mergeWatchlistRows();
        renderWatchlist();
        render();
        setWatchlistMessage(`读取股票池失败：${error.message}`, true);
      }
    }

    async function saveWatchlist() {
      saveWatchlistButton.disabled = true;
      try {
        const response = await fetchWithFallback(WATCHLIST_API, {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(groupsPayload),
        });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.error || `HTTP ${response.status}`);
        watchlist = readWatchlistPayload(payload);
        mergeWatchlistRows();
        renderWatchlist();
        render();
        setWatchlistMessage(payload.message || "保存成功，云端监控将在下一次扫描时自动读取新股票池");
      } catch (error) {
        setWatchlistMessage(`保存失败：${error.message}`, true);
      } finally {
        saveWatchlistButton.disabled = false;
      }
    }

    function createGroup() {
      const name = prompt("请输入分组名称")?.trim();
      if (!name) return;
      if (groupsPayload.groups.some((group) => group.name === name)) return setWatchlistMessage("分组名称不得重复。", true);
      const id = `group-${Date.now()}`;
      groupsPayload.groups.push({ id, name, symbols: [] });
      renderWatchlist();
      setWatchlistMessage("分组已创建，请保存。");
    }

    async function triggerCloudScan() {
      const response = await fetchWithFallback(REFRESH_API, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ force_scan: true }),
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(payload.error || `HTTP ${response.status}`);
      return payload;
    }

    async function loadData() {
      try {
        const response = await fetchWithFallback(DATA_URL);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        rows = Array.isArray(payload.items) ? payload.items : [];
        mergeWatchlistRows();
        updatedAt.textContent = payload.updated_at || "-";
        message.textContent = payload.message || "";
        render();
      } catch (error) {
        rows = [];
        mergeWatchlistRows();
        updatedAt.textContent = "-";
        message.textContent = `读取数据失败：${error.message}`;
        render();
      }
    }

    async function refreshAll({ triggerScan = false } = {}) {
      refreshButton.disabled = true;
      const originalText = refreshButton.textContent;
      refreshButton.textContent = triggerScan ? "刷新中" : originalText;
      try {
        let livePayload = null;
        if (triggerScan) {
          try {
            const payload = await triggerCloudScan();
            if (Array.isArray(payload.items)) livePayload = payload;
            message.textContent = payload.message || "已触发云端扫描，结果生成后会自动刷新。";
          } catch (error) {
            message.textContent = `触发扫描失败，已改为读取现有数据：${error.message}`;
          }
        }
        await Promise.all([loadStatus(), loadWatchlist()]);
        if (livePayload) {
          rows = livePayload.items;
          mergeWatchlistRows();
          updatedAt.textContent = livePayload.updated_at || "-";
          message.textContent = livePayload.message || "实时刷新完成。";
          render();
        } else {
          await loadData();
        }
      } finally {
        refreshButton.disabled = false;
        refreshButton.textContent = originalText;
      }
    }

    searchInput.addEventListener("input", render);
    statusFilter.addEventListener("change", render);
    refreshButton.addEventListener("click", () => refreshAll({ triggerScan: true }));
    newGroupButton.addEventListener("click", createGroup);
    saveWatchlistButton.addEventListener("click", saveWatchlist);
    refreshAll({ triggerScan: true });
    window.setInterval(() => refreshAll(), REFRESH_MS);
    window.setInterval(loadStatus, STATUS_REFRESH_MS);
  </script>
</body>
</html>
